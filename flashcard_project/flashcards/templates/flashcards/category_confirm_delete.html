{% extends 'flashcards/base.html' %}

{% block content %}
<div class="alert alert-danger">
    <h4>Вы уверены, что хотите удалить категорию "{{ category.name }}"?</h4>
    <p>Все записи в этой категории также будут удалены.</p>
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'category_detail' category.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
