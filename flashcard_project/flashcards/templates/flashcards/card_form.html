{% extends 'flashcards/base.html' %}

{% block content %}
<h2>Карточка для колоды "{{ deck.name }}"</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'deck_detail' deck.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
