{% extends 'flashcards/base.html' %}

{% block content %}
<h2>Запись для категории "{{ category.name }}"</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'category_detail' category.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
