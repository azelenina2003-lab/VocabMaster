{% extends 'flashcards/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Мои колоды</h2>
    <a href="{% url 'deck_create' %}" class="btn btn-success">➕ Новая колода</a>
</div>

<div class="row">
    {% for deck in decks %}
        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ deck.name }}</h5>
                    <p class="card-text">{{ deck.description|truncatechars:100 }}</p>
                    <p class="text-muted">Карточек: {{ deck.cards.count }}</p>
                    <a href="{% url 'deck_detail' deck.pk %}" class="btn btn-primary">Открыть</a>
                </div>
            </div>
        </div>
    {% empty %}
        <p>Пока нет ни одной колоды. <a href="{% url 'deck_create' %}">Создай первую!</a></p>
    {% endfor %}
</div>
{% endblock %}
